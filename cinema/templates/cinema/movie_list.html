{% extends "cinema/base.html" %}

{% block title %}Movies - 110 Cinemas{% endblock %}

{% block content %}
<h2>Now Showing</h2>

<form method="get" class="search-form" role="search">
    <div>
        {{ form.q.label_tag }}
        {{ form.q }}
    </div>
    <button type="submit">Search</button>
</form>

<ul class="movie-list">
    {% for movie in movies %}
    {% include "cinema/_movie_card.html" %}
    {% empty %}
    <li>No movies available yet.</li>
    {% endfor %}
</ul>
{% endblock %}
