{% extends "cinema/base.html" %}

{% block title %}Movies - 110 Cinemas{% endblock %}

{% block content %}
<h2>Now Showing</h2>

<form method="get">
    {{ form.q }}
    <button type="submit">Search</button>
</form>

<ul>
    {% for movie in movies %}
    {% include "cinema/_movie_card.html" %}
    {% empty %}
    <li>No movies available yet.</li>
    {% endfor %}
</ul>
{% endblock %}
