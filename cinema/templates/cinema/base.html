<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}110 Cinemas{% endblock %}</title>
</head>
<body>
    <header>
        <h1><a href="{% url 'movie-list' %}">110 Cinemas</a></h1>
        <nav>
            <a href="{% url 'movie-list' %}">Movies</a>
            <a href="{% url 'my-bookings' %}">My Bookings</a>
        </nav>
    </header>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
