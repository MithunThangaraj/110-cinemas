{% extends "cinema/base.html" %}

{% block title %}Select a Seat - 110 Cinemas{% endblock %}

{% block content %}
<h2>{{ screening.movie.title }} - {{ screening.venue }} ({{ screening.start_time }})</h2>

<fieldset class="seat-grid">
    <legend>Select a seat</legend>
    <ul class="seat-grid__seats">
        {% for seat in seats %}
        {% include "cinema/_seat.html" %}
        {% endfor %}
    </ul>
</fieldset>
{% endblock %}
